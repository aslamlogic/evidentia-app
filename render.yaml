services:
  - type: web
    name: evidentia-app
    runtime: nodejs
    buildCommand: "cd app && npm install --legacy-peer-deps --force && npm run build"
    startCommand: "npx serve -s app/out"
    envVars:
      - key: NODE_VERSION
        value: "20.10.0"
      - key: CI
        value: "false"
      - key: PRISMA_SKIP_POSTINSTALL_GENERATE
        value: "1"
      - key: NPM_CONFIG_LEGACY_PEER_DEPS
        value: "true"
